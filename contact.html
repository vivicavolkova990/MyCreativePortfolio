        <section class="contact-section">
    <h1>Зв'яжіться зі мною</h1>
    <div class="contact-card">
        <form>
            <label>Ім'я *</label>
            <input type="text" placeholder="Введіть ваше ім'я" required>
            <label>Email *</label>
            <input type="email" placeholder="example@mail.com" required>
            <label>Тема</label>
            <select>
                <option>Загальне питання</option>
                <option>Співпраця</option>
                <option>Консультація</option>
            </select>
            <label>Повідомлення *</label>
            <textarea placeholder="Ваше повідомлення..." required></textarea>
            <button type="submit">Надіслати</button>
        </form>
    </div>
</section>
